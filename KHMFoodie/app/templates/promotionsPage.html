{% extends "layout/baseRestaurent.html" %}

{% block itemHeader %}
<div class="flex items-center space-x-3 cursor-pointer">
    <div class="text-right hidden sm:block">
        <p class="text-label-md font-bold leading-tight">{{ current_user.name }}</p>
        <p class="text-caption text-secondary">Quản lý</p>
    </div>
    <a href="/me">
        <div class="w-10 h-10 rounded-full border-2 border-primary overflow-hidden">
            <img class="w-full h-full object-cover" alt="{{ current_user.name }}" src="{{ current_user.avatar }}">
        </div>
    </a>
</div>
{% endblock %}

{% block content %}
<div class="w-full p-gutter">
    <div class="max-w-5xl mx-auto">
        <div class="mb-8">
            <h2 class="font-headline-lg text-headline-lg text-on-background">Khuyến mãi</h2>
            <p class="text-body-md text-secondary">Khu vực quản lý voucher và ưu đãi của nhà hàng.</p>
        </div>

        <section class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] p-8">
            <p class="text-body-lg text-on-surface">promos</p>
        </section>
    </div>
</div>
{% endblock %}
